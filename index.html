<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbal Exam App</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background: #f4f4f4;
  color: #1f2937;
}
.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.option {
  display: block;
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  background: #fff;
  font-size: 16px;
  text-align: left;
  cursor: pointer;
  box-sizing: border-box;
}
.option input {
  margin-right: 10px;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}
button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button.secondary {
  background: #6b7280;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.feedback {
  margin-top: 16px;
  padding: 12px;
  border-radius: 10px;
  line-height: 1.45;
}
.correct {
  background: #e8f7ea;
  color: #166534;
}
.incorrect {
  background: #fdecec;
  color: #991b1b;
}
.meta {
  font-size: 14px;
  color: #4b5563;
  margin-bottom: 12px;
}
.helper {
  font-size: 14px;
  color: #4b5563;
  margin-top: 8px;
}
.scoreline {
  font-size: 18px;
  margin-top: 12px;
}
</style>
</head>
<body>

<h2>🌿 Herbal Exam App</h2>
<div id="app"></div>

<script>
const baseQuestions = [
  {q:"Which herb is most specific for chronic venous insufficiency?", options:["Yarrow","Horse Chestnut","Nettle","Dandelion"], answer:[1]},
  {q:"Which herbs are anti-inflammatory?", options:["Nettle","Liquorice","Calendula","Hawthorn"], answer:[0,1,2]},
  {q:"Which constituent gives liquorice its sweet taste?", options:["Flavonoids","Glycyrrhizin","Tannins","Alkaloids"], answer:[1]},
  {q:"Which herbs are hypotensive?", options:["Hawthorn","Motherwort","Yarrow","All of these"], answer:[3]},
  {q:"Which herb contains phthalides?", options:["Celery","Dandelion","Nettle","Yarrow"], answer:[0]},
  {q:"Which herb is most associated with sedative effects?", options:["Valerian","Horse Chestnut","Calendula","Rosemary"], answer:[0]},
  {q:"Which herbs support liver function?", options:["Dandelion","Calendula","Liquorice","All of these"], answer:[3]},
  {q:"Liquorice can cause potassium loss.", options:["True","False"], answer:[0]},
  {q:"Which herbs are BOTH diuretic and anti-inflammatory?", options:["Nettle","Dandelion leaf","Celery","All of these"], answer:[3]},
  {q:"Which herb contains hypericin?", options:["St John's Wort","Hawthorn","Nettle","Sage"], answer:[0]},
  {q:"Which herbs are useful for anxiety?", options:["Passionflower","Valerian","Motherwort","All of these"], answer:[3]},
  {q:"Which herb is best for palpitations linked to menopause?", options:["Rosemary","Motherwort","Yarrow","Calendula"], answer:[1]},
  {q:"Which herbs contain flavonoids?", options:["Hawthorn","Calendula","Nettle","All of these"], answer:[3]},
  {q:"Which herb is a cardiotonic?", options:["Hawthorn","Celery","Elecampane","Cramp Bark"], answer:[0]},
  {q:"Which herb contains β-glucans?", options:["Artist’s Conk","Valerian","Yarrow","Sage"], answer:[0]},
  {q:"Which herbs are useful for dysmenorrhoea?", options:["Cramp Bark","Motherwort","Valerian","All of these"], answer:[3]},
  {q:"Which herb is most associated with wound healing?", options:["Calendula","Hawthorn","Celery","Valerian"], answer:[0]},
  {q:"Which herbs are nervine?", options:["Motherwort","Sage","Rosemary","All of these"], answer:[3]},
  {q:"Which herb contains aescin?", options:["Horse Chestnut","Nettle","Dandelion","Celery"], answer:[0]},
  {q:"Which herbs are antimicrobial?", options:["Calendula","Sage","Elecampane","All of these"], answer:[3]}
];

const QUESTION_COUNT = Math.min(20, baseQuestions.length);
let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  questions = shuffle(baseQuestions).slice(0, QUESTION_COUNT);
  current = 0;
  score = 0;
  answered = false;
  showQuestion();
}

function sameAnswers(selected, correct) {
  if (selected.length !== correct.length) return false;
  const a = [...selected].sort((x, y) => x - y);
  const b = [...correct].sort((x, y) => x - y);
  return a.every((val, idx) => val === b[idx]);
}

function getSelectedAnswers() {
  return Array.from(document.querySelectorAll('input[name="answer"]:checked')).map(el => Number(el.value));
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const isMulti = q.answer.length > 1;

  let html = `
    <div class="card">
      <div class="meta">Question ${current + 1} of ${questions.length} · Score: ${score}</div>
      <h3>${q.q}</h3>
      <div class="helper">${isMulti ? 'Select all that apply.' : 'Select one answer.'}</div>
  `;

  q.options.forEach((opt, i) => {
    const type = isMulti ? 'checkbox' : 'radio';
    html += `
      <label class="option">
        <input type="${type}" name="answer" value="${i}"> ${opt}
      </label>
    `;
  });

  html += `
      <div class="actions">
        <button id="submitBtn" onclick="submitAnswer()">Submit answer</button>
        <button id="nextBtn" class="secondary" onclick="nextQuestion()" disabled>Next question</button>
      </div>
      <div id="feedback"></div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

function submitAnswer() {
  if (answered) return;

  const q = questions[current];
  const selected = getSelectedAnswers();
  const feedback = document.getElementById('feedback');

  if (selected.length === 0) {
    feedback.innerHTML = '<div class="feedback incorrect">Please choose an answer before submitting.</div>';
    return;
  }

  const correct = sameAnswers(selected, q.answer);
  const correctText = q.answer.map(i => q.options[i]).join(', ');
  const selectedText = selected.map(i => q.options[i]).join(', ');

  if (correct) {
    score++;
    feedback.innerHTML = `
      <div class="feedback correct">
        <strong>Correct.</strong><br>
        Answer: ${correctText}
      </div>
    `;
  } else {
    feedback.innerHTML = `
      <div class="feedback incorrect">
        <strong>Incorrect.</strong><br>
        You chose: ${selectedText}<br>
        Correct answer: ${correctText}
      </div>
    `;
  }

  answered = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('nextBtn').disabled = false;
  document.querySelectorAll('input[name="answer"]').forEach(el => el.disabled = true);
}

function nextQuestion() {
  if (!answered) return;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    document.getElementById('app').innerHTML = `
      <div class="card">
        <h2>Finished!</h2>
        <p class="scoreline">Score: ${score}/${questions.length}</p>
        <p>You answered ${questions.length - score} incorrectly.</p>
        <div class="actions">
          <button onclick="startQuiz()">Start new random set</button>
        </div>
      </div>
    `;
  }
}

startQuiz();
</script>

</body>
</html>
