  <meta charset="UTF-8" />

  <style>
    :root{
      --bg:#f4fbf7; --card:#fff; --text:#183126; --muted:#5f746b; --accent:#2f7a58;
      --accent-light:#dff2e7; --border:#d8e8df; --correct:#dff6e5; --wrong:#fde5e5;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:560px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h1,h2,h3,p{margin-top:0}
    .sub{color:var(--muted);font-size:14px}
    .btn{width:100%;border:0;border-radius:16px;padding:14px 16px;font-size:16px;cursor:pointer;margin-top:10px}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{background:var(--accent-light);color:var(--text)}
    .btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
    .option{width:100%;text-align:left;padding:14px;border-radius:16px;border:1px solid var(--border);background:#fff;margin-top:10px;font-size:15px;cursor:pointer}
    .option.selected{border-color:var(--accent);background:#f6fbf8}
    .option.correct{background:var(--correct);border-color:#93d3a7}
    .option.wrong{background:var(--wrong);border-color:#e3a1a1}
    .row{display:flex;gap:10px}.row .btn{margin-top:0}
    .badge{display:inline-block;background:var(--accent-light);border-radius:999px;padding:6px 10px;font-size:12px;margin:0 6px 8px 0}
    select{width:100%;padding:12px;border-radius:14px;border:1px solid var(--border);font-size:15px;background:#fff;margin:8px 0 6px}
    .progress{height:8px;background:#ebf3ee;border-radius:999px;overflow:hidden;margin:10px 0 16px}
    .bar{height:100%;background:var(--accent);width:0%;transition:width .2s ease}
    .review,.factbox{border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:10px}
    ul{padding-left:18px;margin:8px 0}
    .tiny{font-size:12px;color:var(--muted)}
  </style>
</head>

function shuffle(arr){
  const copy=[...arr];
  for(let i=copy.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }
  return copy;
}

function getPool(){
  return state.herb==="All herbs" ? [...questionBank] : questionBank.filter(q=>q.herb===state.herb);
}

function openStudyLibrary(){
  state.screen="study";
  render();
}

function startHerbQuiz(){
  const pool = state.herb==="All herbs" ? [...questionBank] : questionBank.filter(q=>q.herb===state.herb);
  state.questions = shuffle(pool).slice(0, Math.min(12, pool.length));
  state.current=0; state.selected=null; state.checked=false; state.score=0; state.review=[]; state.mode="studyQuiz"; state.screen="quiz";
  render();
}

function startMixedQuiz(){
  const pool = getPool();
  state.questions = shuffle(pool).slice(0, Math.min(10, pool.length));
  state.current=0; state.selected=null; state.checked=false; state.score=0; state.review=[]; state.mode="mixed"; state.screen="quiz";
  render();
}

function startMockExam(){
  const pool = shuffle(questionBank);
  state.questions = pool.slice(0, Math.min(20, pool.length));
  state.current=0; state.selected=null; state.checked=false; state.score=0; state.review=[]; state.mode="mock"; state.screen="quiz";
  render();
}

function renderHome(){
  return `
    <h1>Herbal Quiz App</h1>
    <p class="sub">Version 2 — more questions, herb study pages, species and similar-action questions</p>
    <label><strong>Choose a herb focus</strong></label>
    <select id="herbSelect">
      ${herbNames.map(h => `<option ${state.herb===h?'selected':''}>${h}</option>`).join('')}
    </select>
    <button class="btn btn-primary" onclick="openStudyLibrary()">Study by Herb</button>
    <button class="btn btn-secondary" onclick="startMixedQuiz()">Mixed Quiz</button>
    <button class="btn btn-outline" onclick="startMockExam()">Mock Exam</button>
    <div class="factbox">
      <strong>What changed in Version 2</strong>
      <ul class="sub">
        <li>Study by Herb now opens a real study screen, not a quiz.</li>
        <li>More questions have been added, including species/family and similar-action questions.</li>
        <li>Mock exam now pulls a larger random set than the mixed quiz.</li>
      </ul>
    </div>
  `;
}

function renderStudy(){
  if(state.herb==="All herbs"){
    return `
      <h2>Study by Herb</h2>
      <p class="sub">Choose one herb from the dropdown on the home screen for a focused study page.</p>
      <div class="factbox">
        <strong>Tip</strong>
        <p class="sub" style="margin-bottom:0">For best results, pick one herb, review the study page, then tap “Start herb quiz”.</p>
      </div>
      <div class="row" style="margin-top:16px;">
        <button class="btn btn-outline" onclick="goHome()">Home</button>
        <button class="btn btn-primary" onclick="startHerbQuiz()">Start all-herb study quiz</button>
      </div>
    `;
  }
  const h = HERB_INFO[state.herb];
  const count = questionBank.filter(q => q.herb===state.herb).length;
  return `
    <h2>Study by Herb</h2>
    <div class="badge">${state.herb}</div>
    <div class="badge">${count} questions loaded</div>
    <div class="factbox">
      <strong>Latin name</strong>
      <p class="sub">${h.latin}</p>
      <strong>Family</strong>
      <p class="sub">${h.family}</p>
      <strong>Parts used</strong>
      <p class="sub">${h.parts}</p>
    </div>
    <div class="factbox">
      <strong>Key actions</strong>
      <ul>${h.keyActions.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>
    <div class="factbox">
      <strong>Plants with similar actions</strong>
      <ul>${h.similar.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>
    <div class="factbox">
      <strong>Species / exam notes</strong>
      <ul>${h.speciesNotes.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>
    <div class="row" style="margin-top:16px;">
      <button class="btn btn-outline" onclick="goHome()">Home</button>
      <button class="btn btn-primary" onclick="startHerbQuiz()">Start herb quiz</button>
    </div>
  `;
}

function renderQuiz(){
  const q=state.questions[state.current];
  const progress=((state.current)/state.questions.length)*100;
  const title = state.mode==="mock" ? "Mock Exam" : state.mode==="studyQuiz" ? `${state.herb} Quiz` : "Mixed Quiz";
  return `
    <h2>${title}</h2>
    <div class="sub">Question ${state.current+1} of ${state.questions.length}</div>
    <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
    <div class="badge">${q.herb}</div>
    <div class="badge">${q.difficulty}</div>
    <h3>${q.question}</h3>
    ${q.options.map((opt,i)=>{
      let cls='option';
      if(state.selected===i) cls+=' selected';
      if(state.checked && i===q.answer) cls+=' correct';
      if(state.checked && state.selected===i && i!==q.answer) cls+=' wrong';
      return `<button class="${cls}" onclick="chooseOption(${i})">${opt}</button>`;
    }).join('')}
    ${state.checked ? `<div class="review"><strong>${state.selected===q.answer ? 'Correct' : 'Not quite'}</strong><p class="sub" style="margin:8px 0 0">${q.explanation}</p></div>` : ''}
    <div class="row" style="margin-top:16px;">
      <button class="btn btn-outline" onclick="goHome()">Home</button>
      ${state.checked
        ? `<button class="btn btn-primary" onclick="nextQuestion()">${state.current+1>=state.questions.length?'Finish':'Next'}</button>`
        : `<button class="btn btn-primary" onclick="checkAnswer()">Check</button>`}
    </div>
  `;
}

function renderResults(){
  const percent=Math.round((state.score/state.questions.length)*100);
  return `
    <h2>Your Results</h2>
    <div class="factbox">
      <h3>${state.score} / ${state.questions.length}</h3>
      <p class="sub" style="margin-bottom:0">${percent}% correct</p>
    </div>
    <div style="margin-top:16px">
      ${state.review.map((item,idx)=>`
        <div class="review">
          <strong>${idx+1}. ${item.question}</strong>
          <p class="sub">Your answer: ${item.options[item.selected] || 'No answer selected'}</p>
          ${item.selected!==item.answer ? `<p class="sub">Correct answer: ${item.options[item.answer]}</p>` : ``}
          <p class="sub" style="margin-bottom:0">${item.explanation}</p>
        </div>
      `).join('')}
    </div>
    <div class="row" style="margin-top:16px;">
      <button class="btn btn-outline" onclick="goHome()">Home</button>
      <button class="btn btn-primary" onclick="startMixedQuiz()">New mixed quiz</button>
    </div>
    <p class="tiny" style="margin-top:12px">Tip: Use “Study by Herb” for focused revision, then switch to mixed quiz or mock exam to test recall.</p>
  `;
}

function chooseOption(i){ if(state.checked) return; state.selected=i; render(); }
function checkAnswer(){
  if(state.selected===null) return;
  const q=state.questions[state.current];
  if(state.selected===q.answer) state.score++;
  state.review.push({...q, selected:state.selected});
  state.checked=true;
  render();
}
function nextQuestion(){
  if(state.current+1>=state.questions.length){ state.screen="results"; }
  else { state.current++; state.selected=null; state.checked=false; }
  render();
}
function goHome(){ state.screen="home"; render(); }

function render(){
  const app=document.getElementById('app');
  if(state.screen==="home") app.innerHTML=renderHome();
  if(state.screen==="study") app.innerHTML=renderStudy();
  if(state.screen==="quiz") app.innerHTML=renderQuiz();
  if(state.screen==="results") app.innerHTML=renderResults();
  const select=document.getElementById('herbSelect');
  if(select){
    select.addEventListener('change', e => { state.herb=e.target.value; });
  }
}
render();
</script>
</body>
</html>
